name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Derive release version
      id: version
      run: |
        version_name="${GITHUB_REF_NAME#v}"
        IFS='.' read -r major minor patch <<< "$version_name"
        version_code=$((major * 10000 + minor * 100 + patch))

        echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
        echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

    - name: Build debug APK
      run: ./gradlew assembleDebug -PreleaseVersionName="${{ steps.version.outputs.version_name }}" -PreleaseVersionCode="${{ steps.version.outputs.version_code }}"

    - name: Build release APK
      run: ./gradlew assembleRelease -PreleaseVersionName="${{ steps.version.outputs.version_name }}" -PreleaseVersionCode="${{ steps.version.outputs.version_code }}"

    - name: Rename APKs
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk cluster-headache-tracker-debug.apk
        mv app/build/outputs/apk/release/app-release.apk cluster-headache-tracker.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          cluster-headache-tracker.apk
          cluster-headache-tracker-debug.apk
